<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Búsqueda del Cache Oscuro</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.logo{
    width:250px;
    max-width:90%;
    margin-bottom:10px;
}

h1{
    margin-top:0;
    margin-bottom:20px;
}

#language-selector{
    margin-bottom:25px;
}

#language-selector button{
    margin:0 4px;
    padding:8px 16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.chapter{
    display:block;
    background:#222;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:12px 0;
    border-radius:10px;
    font-size:1.1rem;
    transition:0.2s;
}

.chapter:hover{
    background:#333;
}

</style>

</head>

<body>

<div class="container">

    <img
        src="dark-cache-logo.png"
        alt="Cache Oscuro"
        class="logo"
    >

    <h1>La Búsqueda del Cache Oscuro</h1>

    <div id="language-selector">

        <button onclick="setLanguage('ca')">
            CAT
        </button>

        <button onclick="setLanguage('es')">
            ESP
        </button>

        <button onclick="setLanguage('en')">
            ENG
        </button>

    </div>

    <div id="list">
        Cargando...
    </div>

</div>

<script>

let language =
    localStorage.getItem("language");

if(!language){

    const browserLang =
        navigator.language.toLowerCase();

    if(browserLang.startsWith("ca")){

        language = "ca";

    }else if(browserLang.startsWith("en")){

        language = "en";

    }else{

        language = "es";
    }
}

function setLanguage(lang){

    localStorage.setItem(
        "language",
        lang
    );

    location.reload();
}

</script>

</body>
</html>
